          - heading "Why Most People Choose the Wrong IBC Company" [level=2] [ref=e110]
          - paragraph [ref=e111]: Most people approach company selection like they’re shopping for car insurance — they want the “cheapest” option with the “highest dividends.” This is backwards thinking that leads to poorly designed policies and disappointing results.
          - heading "The Real Success Factors (In Order of Importance):" [level=3] [ref=e112]
