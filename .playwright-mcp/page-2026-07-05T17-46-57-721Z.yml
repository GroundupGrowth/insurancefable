            - text: strategies.
          - blockquote [ref=e155]:
            - paragraph [ref=e156]: “The dividend rate gets all the attention, but it’s only part of the story. What matters is how much of your premium actually goes into cash value in the early years — and that comes down to policy design and how flexible the company is with paid-up additions. A 6% dividend on a poorly designed policy will underperform a 5.5% dividend on a well-designed one every time.”
            - strong [ref=e158]: — Barry Brooksby, 25+ years financial services
