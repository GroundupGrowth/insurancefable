            - text: while maintaining strong long-term growth.
          - paragraph [ref=e143]:
            - text: Key performance metrics include
            - link "dividend payment consistency" [ref=e144] [cursor=pointer]:
              - /url: /whole-life-insurance-dividends-rate-history/
            - text: through every economic crisis, cash value accumulation speed, and favorable policy loan arbitrage spreads.
          - generic [ref=e145]:
            - strong [ref=e146]: "Industry insight:"
            - text: Direct recognition vs. non-direct recognition matters less than most people think. Several direct recognition companies in our top 10 consistently outperform non-direct recognition competitors when you analyze total policy performance over time.
          - 'heading "Criteria 3: Financial Stability" [level=3] [ref=e147]'
          - paragraph [ref=e148]:
            - text: We prioritized companies with
            - link "A.M. Best ratings of A or higher" [ref=e149] [cursor=pointer]:
              - /url: /top-25-highest-rated-insurance-companies/
            - text: ", 100+ year operating histories, and conservative investment philosophies focused on bonds and real estate over Wall Street speculation. When the next financial crisis hits, you want your banking system with a company that’s survived every previous crisis."
          - 'heading "Criteria 4: Policy Design Flexibility" [level=3] [ref=e150]'
          - paragraph [ref=e151]: The best infinite banking companies offer flexible paid-up additions riders, multiple premium payment options (10-pay, 20-pay, life-pay), convertible term riders for strategic death benefit optimization, and accommodating underwriting for IBC-structured policies.
          - 'heading "Criteria 5: Agent Education & Independence" [level=3] [ref=e152]'
          - paragraph [ref=e153]:
            - text: We favor companies with independent broker networks, training in cash value optimization rather than traditional death benefit sales, and home office support for
            - link "Volume-Based Banking" [ref=e154] [cursor=pointer]:
