              - paragraph [ref=e870]: Every company on our list has survived 100+ years of economic crises — including the Great Depression, two World Wars, stagflation, the dot-com bust, and the 2008 financial crisis. Additionally, each state has a guaranty association that protects policyholders up to certain limits (typically $300,000-$500,000 in cash value) if an insurer fails. This is why we prioritize A-rated or higher mutual companies with conservative investment portfolios. The risk of a top-rated mutual company failing is extraordinarily low, but the safety net exists regardless.
