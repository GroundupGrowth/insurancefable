              - paragraph [ref=e864]: The insurance company lends you money using your cash value as collateral. Your cash value continues growing at dividend rates while you use the proceeds. With non-direct recognition or preferred loan provisions, you can profit from the spread between what you earn and what you pay — plus returns from deploying the capital elsewhere.
